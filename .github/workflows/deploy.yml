name: Deploy to Hetzner

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            git config --global --add safe.directory /opt/finanzas/api
            cd /opt/finanzas/api
            git pull origin master

            # Run pending migrations
            chmod +x ./scripts/migrate.sh
            POSTGRES_CONTAINER=$(docker ps --filter "name=finanzas-db" --filter "status=running" --format "{{.Names}}" | head -1)
            if [ -z "$POSTGRES_CONTAINER" ]; then
              echo "⚠️  No postgres container found, skipping migrations"
            else
              echo "📦 Postgres container: $POSTGRES_CONTAINER"
              DB_USER=finanzas_user DB_NAME=finanzas_personal ./scripts/migrate.sh "$POSTGRES_CONTAINER"
            fi

            # Build and restart API
            cd /opt/finanzas
            docker compose down
            docker rmi finanzas-api:latest --force || true
            docker compose build --no-cache api
            docker compose up -d
            docker system prune -f
            echo "Deploy completed at $(date)"
